name: Rotate Facebook Token
on:
  workflow_dispatch:
    inputs:
      new_token:
        description: "New Facebook Page Token"
        required: true
        type: string

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: dopplerhq/cli-action@v3

      - name: Update Facebook Page Token in Doppler
        run: |
          doppler secrets set "FACEBOOK_PAGE_TOKEN=$NEW_TOKEN" --no-interactive
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          NEW_TOKEN: ${{ inputs.new_token }}